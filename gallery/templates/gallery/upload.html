<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">

        {% load static %}
        <link rel="stylesheet" href="{% static 'gallery/style.css' %}">
        <title>Загрузка модели</title>
    </head>
    <body class="upload-page">
        <!-- ========== НОВЫЙ ФИКСИРОВАННЫЙ ХЕДЕР ========== -->
        <header class="main-header" id="mainHeader">
            <div class="header-container">
                <!-- Логотип слева -->
                <a href="{% url 'home' %}" class="logo">
                    🎨 3D Storage
                </a>
                
                <!-- Бургер-меню (только на мобилках) -->
                <div class="burger-menu" id="burgerMenu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                
                <!-- Навигация справа -->
                <nav class="nav-menu" id="navMenu">
                    <a href="{% url 'home' %}" class="nav-link {% if request.path == '/' %}active{% endif %}" data-icon="🏠">
                        🏠 Галерея
                    </a>
                    <a href="{% url 'about' %}" class="nav-link {% if 'about' in request.path %}active{% endif %}" data-icon="📖">
                        📖 О нас
                    </a>
                    <a href="{% url 'upload' %}" class="nav-link upload-btn">
                        ✨ Загрузить
                    </a>
                    <button class="theme-toggle-header" id="themeToggleHeader">🌙</button>
                </nav>
            </div>
        </header>

        <main>
            <h1>Загрузить новую 3D модель</h1>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- Django сам нарисует label и input для всех полей -->
                <div class="form-group">
                    {{ form.as_p }}
                </div>

                <!-- БЛОК ПРЕВЬЮ -->
                <div style="margin-bottom: 20px;">
                    <p>Авто-генерация превью:</p>

                    <!-- Сюда JS вставит Canvas с 3D моделью -->
                    <div id="preview-container" style="width: 300px; height: 200px; background: #eee;
                    border: 1px solid #ccc;">
                        <span style="display: block; padding: 80px 0; text-align: center; color:
                        #999;">Выберите файл...</span>
                    </div>

                    <!-- СКРЫТОЕ ПОЛЕ ДЛЯ BASE64 -->
                    <input type="hidden" name="image_data" id="id_image_data">
                </div>

                <!-- Кнопка отправки (блокируем её, пока не сгенерируется картинка) -->
                <button type="submit" id="submit-btn" disabled>Загрузить в базу</button>
            </form>
        </main>

        <!-- Подключаем скрипт-генератор -->
        {% load static %}
        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>
        <script type="module" src="{% static 'gallery/js/autothumb.js' %}"></script>
        <script src="{% static 'gallery/js/theme.js' %}"></script>
       

    </body>
</html>
